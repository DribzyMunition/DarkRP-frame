kind = "web"
previewPath = "/"
title = "S&Box DarkRP Systems Map"
version = "1.0.0"
id = "artifacts/sbox-darkrp-map"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20298

[services.development]
run = "pnpm --filter @workspace/sbox-darkrp-map run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sbox-darkrp-map", "run", "build" ]
publicDir = "artifacts/sbox-darkrp-map/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20298"
BASE_PATH = "/"
